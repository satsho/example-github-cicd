name: Conditions
on: workflow_dispatch
jobs:
  skip-or-run:
    runs-on: ubuntu-latest
    env:
      RUN_ID: ${{github.run_id}}
    steps:
      - name: 1
        run: echo "RUN ID is ${RUN_ID}"

      - name: 2 
        run: echo "Hello"
        if: ${{ contains(github.run_id, '1') }} # ワークフロー実行IDで分岐

      - name: 3 
        run: echo "Bye"
        if: ${{ !contains(github.run_id, '1') }} # ワークフロー実行IDで分岐
